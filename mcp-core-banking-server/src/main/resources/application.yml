server:
  port: 8086

spring:
  application:
    name: mcp-core-banking-server

  # --- Redis (used for caching) ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  # --- Cache ---
  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes
      cache-null-values: false

# --- Finacle Core Banking System ---
finacle:
  base-url: ${FINACLE_BASE_URL:http://localhost:9090}

# --- Resilience4j Configuration ---
resilience4j:
  circuitbreaker:
    instances:
      finacle:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s
        record-exceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - java.util.concurrent.TimeoutException
          - java.io.IOException

  retry:
    instances:
      finacle:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException
          - java.util.concurrent.TimeoutException

  ratelimiter:
    instances:
      finacle:
        limit-for-period: 100
        limit-refresh-period: 1s
        timeout-duration: 5s

# --- Vault ---
agent:
  vault:
    base-url: ${VAULT_POLICY_URL:http://vault-policy-service:8082}

# --- Actuator & Observability ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# --- API Docs ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# --- Logging ---
logging:
  level:
    com.idfcfirstbank.agent.mcp.corebanking: DEBUG
    io.github.resilience4j: INFO

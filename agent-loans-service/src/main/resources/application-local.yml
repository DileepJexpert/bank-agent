# Local debug profile - points to Docker Desktop services + Ollama
# Usage: mvn spring-boot:run -pl agent-loans-service -Dspring-boot.run.profiles=local
server:
  port: 8090

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.anthropic.AnthropicAutoConfiguration
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:29092
  ai:
    openai:
      api-key: ollama
      base-url: http://localhost:11434/v1
      chat:
        options:
          model: llama3.1
          temperature: 0.1

agent:
  llm:
    provider: ollama
    model-name: llama3.1
  vault:
    base-url: http://localhost:8082
  mcp:
    credit-bureau-url: http://localhost:8091
    account-aggregator-url: http://localhost:8092
    loan-origination-url: http://localhost:8093
    core-banking-url: http://localhost:8086

logging:
  level:
    com.idfcfirstbank.agent.loans: DEBUG
    org.springframework.ai: DEBUG

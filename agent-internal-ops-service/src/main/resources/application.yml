server:
  port: 8097

spring:
  application:
    name: agent-internal-ops-service

  # --- Redis ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  # --- Kafka ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: internal-ops-agent-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.idfcfirstbank.agent.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # --- Database ---
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/internal_ops
    username: ${SPRING_DATASOURCE_USERNAME:platform}
    password: ${SPRING_DATASOURCE_PASSWORD:platform_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  # --- Spring Batch ---
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

# --- LLM Provider Configuration ---
# Enable one or more providers via llm.<provider>.enabled=true
# Multiple providers can be enabled simultaneously for LlmRouter failover.
llm:
  timeout: ${LLM_TIMEOUT:30s}
  ollama:
    enabled: ${LLM_OLLAMA_ENABLED:true}
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.1}
  anthropic:
    enabled: ${LLM_ANTHROPIC_ENABLED:false}
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
  openai:
    enabled: ${LLM_OPENAI_ENABLED:false}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
  azure:
    enabled: ${LLM_AZURE_ENABLED:false}
    endpoint: ${AZURE_OPENAI_ENDPOINT:}
    api-key: ${AZURE_OPENAI_KEY:}
    deployment: ${AZURE_OPENAI_DEPLOYMENT:gpt-4o}
    api-version: ${AZURE_OPENAI_API_VERSION:2024-02-15-preview}

# --- Agent Platform Configuration ---
agent:
  llm:
    provider: ${LLM_PROVIDER:ollama}
    model-name: ${LLM_MODEL:llama3.1}
    api-key: ${LLM_API_KEY:}
    temperature: 0.7
    max-tokens: 4096
    timeout: 30s

  vault:
    base-url: ${VAULT_POLICY_URL:http://vault-policy-service:8082}

  mcp:
    core-banking-url: ${MCP_CORE_BANKING_URL:http://mcp-core-banking-server:8086}
    crm-url: ${MCP_CRM_URL:http://mcp-crm-server:8098}

# --- Actuator & Observability ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# --- API Docs ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# --- Logging ---
logging:
  level:
    com.idfcfirstbank.agent.internalops: DEBUG
    org.springframework.batch: INFO

# Local debug profile - points to Docker Desktop services + Ollama
# Usage: mvn spring-boot:run -pl agent-internal-ops-service -Dspring-boot.run.profiles=local
server:
  port: 8097

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.anthropic.AnthropicAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/internal_ops
    username: platform
    password: platform_dev_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:29092
  batch:
    jdbc:
      initialize-schema: always
  ai:
    openai:
      api-key: ollama
      base-url: http://localhost:11434/v1
      chat:
        options:
          model: llama3.1
          temperature: 0.1

agent:
  llm:
    provider: ollama
    model-name: llama3.1
  vault:
    base-url: http://localhost:8082
  mcp:
    core-banking-url: http://localhost:8086
    crm-server-url: http://localhost:8098

logging:
  level:
    com.idfcfirstbank.agent.internalops: DEBUG
    org.springframework.ai: DEBUG

# Local debug profile - points to Docker Desktop services
# Usage: mvn spring-boot:run -pl vault-audit-service -Dspring-boot.run.profiles=local
server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vault_audit
    username: platform
    password: platform_dev_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: vault-audit-local
      auto-offset-reset: earliest

logging:
  level:
    com.idfcfirstbank.agent.vault: DEBUG

# Local debug profile - points to Docker Desktop services
# Usage: mvn spring-boot:run -pl vault-policy-service -Dspring-boot.run.profiles=local
server:
  port: 8082

spring:
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:29092

opa:
  url: http://localhost:8181

logging:
  level:
    com.idfcfirstbank.agent.vault: DEBUG

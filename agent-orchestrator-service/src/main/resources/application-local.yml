# =============================================================================
# LOCAL DEBUG PROFILE - Points to Docker Desktop services + Ollama
# =============================================================================
# Usage:
#   mvn spring-boot:run -pl agent-orchestrator-service -Dspring-boot.run.profiles=local
#
# Or in IntelliJ IDEA:
#   Run Configuration > Active profiles: local
#
# Prerequisites (Docker Desktop):
#   cd deployment/docker
#   docker compose up -d postgres redis zookeeper kafka opa
#
# Prerequisites (Ollama):
#   ollama serve
#   ollama pull llama3.1

server:
  port: 8084

spring:
  application:
    name: agent-orchestrator-service

  # Docker Redis on localhost
  data:
    redis:
      host: localhost
      port: 6379

  # Docker Kafka on localhost (external port 29092)
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: orchestrator-local
      auto-offset-reset: earliest

# LLM - Ollama only in local profile
llm:
  provider: ollama
  ollama:
    enabled: true
    base-url: http://localhost:11434
    model: llama3.1

# AI enabled by default in local profile
ai:
  enabled: true

# Agent config
agent:
  llm:
    provider: ollama
    model-name: llama3.1
    api-key: not-needed-for-ollama
    temperature: 0.1
    max-tokens: 500
    timeout: 60s

  vault:
    base-url: http://localhost:8082

  routing:
    account-service-url: http://localhost:8085
    card-service-url: http://localhost:8088
    loans-service-url: http://localhost:8090

  mcp:
    core-banking-url: http://localhost:8086
    credit-bureau-url: http://localhost:8091

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# API Docs
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging - verbose for debugging
logging:
  level:
    com.idfcfirstbank.agent.orchestrator: DEBUG
    org.springframework.web: DEBUG
    org.springframework.statemachine: WARN

server:
  port: 8087

spring:
  application:
    name: vault-anomaly-service

  datasource:
    url: jdbc:postgresql://localhost:5432/vault_anomaly
    username: ${DB_USERNAME:vault_anomaly}
    password: ${DB_PASSWORD:vault_anomaly}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: vault-anomaly-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      properties:
        max.poll.records: 100
        max.poll.interval.ms: 300000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    streams:
      application-id: vault-anomaly-streams
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      state-dir: ${KAFKA_STREAMS_STATE_DIR:/tmp/kafka-streams/vault-anomaly}
      properties:
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        default.value.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        commit.interval.ms: 1000
        num.stream.threads: 3
    listener:
      ack-mode: record
      concurrency: 3

agent:
  anomaly:
    high-rate-threshold: 100
    coordinated-access-threshold: 5
    window-minutes: 5
    baseline-update-interval-minutes: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.idfcfirstbank.agent.vault.anomaly: DEBUG
    org.apache.kafka: INFO
    org.apache.kafka.streams: INFO

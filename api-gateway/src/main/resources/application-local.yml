# Local debug profile - points to local services
# Usage: mvn spring-boot:run -pl api-gateway -Dspring-boot.run.profiles=local
server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
  data:
    redis:
      host: localhost
      port: 6379

# Route to local services
app:
  services:
    vault-identity: http://localhost:8081
    vault-policy: http://localhost:8082
    vault-audit: http://localhost:8083
    orchestrator: http://localhost:8084
    account-agent: http://localhost:8085
    core-banking-mcp: http://localhost:8086

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

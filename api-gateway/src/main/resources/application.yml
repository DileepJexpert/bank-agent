server:
  port: 8080
  netty:
    connection-timeout: 10s
    idle-timeout: 60s

spring:
  application:
    name: api-gateway

  cloud:
    # Gateway configuration
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
        pool:
          type: ELASTIC
          max-idle-time: 15s
          max-life-time: 60s

    # Kubernetes-based service discovery (for EKS)
    kubernetes:
      discovery:
        enabled: "${KUBERNETES_DISCOVERY_ENABLED:false}"
        all-namespaces: false
      loadbalancer:
        mode: SERVICE

    # Load balancer
    loadbalancer:
      retry:
        enabled: true

  # Redis configuration for rate limiter
  data:
    redis:
      host: "${REDIS_HOST:localhost}"
      port: "${REDIS_PORT:6379}"
      password: "${REDIS_PASSWORD:}"
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # Config server integration
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

# Gateway custom configuration
gateway:
  rate-limiter:
    replenish-rate: "${RATE_LIMIT_REPLENISH_RATE:50}"
    burst-capacity: "${RATE_LIMIT_BURST_CAPACITY:100}"
    requested-tokens: 1
  vault-policy:
    evaluation-url: "lb://vault-policy-service/api/v1/vault/policy/evaluate"

# Resilience4j Circuit Breaker defaults
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 80
        record-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.web.reactive.function.client.WebClientResponseException.ServiceUnavailable
          - org.springframework.web.reactive.function.client.WebClientResponseException.InternalServerError
    instances:
      orchestratorCircuitBreaker:
        base-config: default
      accountCircuitBreaker:
        base-config: default
      vaultIdentityCircuitBreaker:
        base-config: default
      vaultPolicyCircuitBreaker:
        base-config: default
        failure-rate-threshold: 30
        wait-duration-in-open-state: 15s
      vaultAuditCircuitBreaker:
        base-config: default
      mcpCoreBankingCircuitBreaker:
        base-config: default
        slow-call-duration-threshold: 15s
  timelimiter:
    configs:
      default:
        timeout-duration: 30s

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway,circuitbreakers,ratelimiters
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    gateway:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# Logging
logging:
  level:
    root: INFO
    com.idfcfirstbank.agent.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-}] %-5level %logger{36} - %msg%n"

# SpringDoc OpenAPI
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: orchestrator
        url: /api/v1/orchestrator/v3/api-docs
      - name: accounts
        url: /api/v1/accounts/v3/api-docs
      - name: vault-identity
        url: /api/v1/vault/identity/v3/api-docs
      - name: vault-policy
        url: /api/v1/vault/policy/v3/api-docs
      - name: vault-audit
        url: /api/v1/vault/audit/v3/api-docs

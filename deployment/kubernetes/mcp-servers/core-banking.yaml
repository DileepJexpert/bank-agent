---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: core-banking-mcp
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: core-banking-mcp
    app.kubernetes.io/part-of: ai-agent-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-banking-mcp
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: core-banking-mcp
    app.kubernetes.io/part-of: ai-agent-platform
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: core-banking-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: core-banking-mcp
        app.kubernetes.io/part-of: ai-agent-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8086"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: core-banking-mcp
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 45
      containers:
        - name: core-banking-mcp
          image: ai-agent-platform/core-banking-mcp:1.0.0-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.mcp-servers.svc.cluster.local:5432/core_banking"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mcp-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mcp-db-credentials
                  key: password
            - name: SPRING_REDIS_HOST
              value: "redis.mcp-servers.svc.cluster.local"
            - name: SPRING_REDIS_PORT
              value: "6379"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.mcp-servers.svc.cluster.local:9092"
            - name: VAULT_AUDIT_URL
              value: "http://vault-audit.vault.svc.cluster.local:8083"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - core-banking-mcp
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: core-banking-mcp
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: core-banking-mcp
    app.kubernetes.io/part-of: ai-agent-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8086
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: core-banking-mcp
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: core-banking-mcp
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: core-banking-mcp
    app.kubernetes.io/part-of: ai-agent-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: core-banking-mcp
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: core-banking-mcp-network-policy
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: core-banking-mcp
    app.kubernetes.io/part-of: ai-agent-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: core-banking-mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/component: agents
      ports:
        - protocol: TCP
          port: 8086
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/component: vault
      ports:
        - protocol: TCP
          port: 8086
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/component: monitoring
      ports:
        - protocol: TCP
          port: 8086
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9092
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/component: vault
      ports:
        - protocol: TCP
          port: 8083
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53

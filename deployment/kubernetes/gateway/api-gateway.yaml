---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: ai-agent-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: ai-agent-platform
data:
  application.yaml: |
    server:
      port: 8080
      shutdown: graceful

    spring:
      application:
        name: api-gateway
      lifecycle:
        timeout-per-shutdown-phase: 30s
      cloud:
        gateway:
          routes:
            - id: vault-identity
              uri: http://vault-identity.vault.svc.cluster.local:8081
              predicates:
                - Path=/api/v1/auth/**
            - id: vault-policy
              uri: http://vault-policy.vault.svc.cluster.local:8082
              predicates:
                - Path=/api/v1/policies/**
            - id: vault-audit
              uri: http://vault-audit.vault.svc.cluster.local:8083
              predicates:
                - Path=/api/v1/audit/**
            - id: orchestrator
              uri: http://orchestrator.agents.svc.cluster.local:8084
              predicates:
                - Path=/api/v1/agents/**
            - id: account-agent
              uri: http://account-agent.agents.svc.cluster.local:8085
              predicates:
                - Path=/api/v1/accounts/**
            - id: core-banking-mcp
              uri: http://core-banking-mcp.mcp-servers.svc.cluster.local:8086
              predicates:
                - Path=/api/v1/banking/**

    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus,metrics
      endpoint:
        health:
          show-details: always
          probes:
            enabled: true

    logging:
      level:
        root: INFO
        com.bank.gateway: DEBUG
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: ai-agent-platform
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: ai-agent-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: api-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 45
      containers:
        - name: api-gateway
          image: ai-agent-platform/api-gateway:1.0.0-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: api-gateway-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - api-gateway
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: ai-agent-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: api-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: ai-agent-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

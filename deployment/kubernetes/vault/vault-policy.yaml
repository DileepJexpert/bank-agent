---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-policy
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-policy
    app.kubernetes.io/part-of: ai-agent-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-policy
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-policy
    app.kubernetes.io/part-of: ai-agent-platform
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: vault-policy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-policy
        app.kubernetes.io/part-of: ai-agent-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: vault-policy
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 45
      containers:
        - name: vault-policy
          image: ai-agent-platform/vault-policy:1.0.0-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres.vault.svc.cluster.local:5432/vault_policy"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: vault-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vault-db-credentials
                  key: password
            - name: OPA_SIDECAR_URL
              value: "http://localhost:8181"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        - name: opa-sidecar
          image: openpolicyagent/opa:0.60.0-envoy
          imagePullPolicy: IfNotPresent
          ports:
            - name: opa-http
              containerPort: 8181
              protocol: TCP
          args:
            - "run"
            - "--server"
            - "--addr=0.0.0.0:8181"
            - "--log-level=info"
            - "--log-format=json"
            - "/policies"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: opa-http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health?bundles
              port: opa-http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: opa-policies
              mountPath: /policies
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: opa-policies
          configMap:
            name: opa-policies
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - vault-policy
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: vault-policy
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-policy
    app.kubernetes.io/part-of: ai-agent-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8082
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: vault-policy
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vault-policy
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-policy
    app.kubernetes.io/part-of: ai-agent-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vault-policy
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vault-policy-network-policy
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-policy
    app.kubernetes.io/part-of: ai-agent-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault-policy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/component: gateway
      ports:
        - protocol: TCP
          port: 8082
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/component: vault
      ports:
        - protocol: TCP
          port: 8082
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/component: monitoring
      ports:
        - protocol: TCP
          port: 8082
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policies
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-policy
    app.kubernetes.io/part-of: ai-agent-platform
data:
  banking_policy.rego: |
    package banking.authorization

    default allow = false

    # Allow authenticated users to access their own accounts
    allow {
      input.method == "GET"
      input.path = ["api", "v1", "accounts", account_id]
      input.user.account_ids[_] == account_id
    }

    # Allow transfers below daily limit
    allow {
      input.method == "POST"
      input.path = ["api", "v1", "transfers"]
      input.body.amount <= input.user.daily_transfer_limit
    }

    # Allow admins full access
    allow {
      input.user.roles[_] == "ADMIN"
    }

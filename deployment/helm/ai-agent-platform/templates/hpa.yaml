{{/* ===================== Orchestrator HPA ===================== */}}
{{- if .Values.orchestrator.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orchestrator
  namespace: {{ .Values.namespaces.agents.name }}
  labels:
    {{- include "ai-agent-platform.serviceLabels" (dict "name" "orchestrator" "context" $) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orchestrator
  minReplicas: {{ .Values.orchestrator.hpa.minReplicas }}
  maxReplicas: {{ .Values.orchestrator.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.orchestrator.hpa.targetCPUUtilization }}
    {{- if .Values.orchestrator.hpa.customMetrics.enabled }}
    - type: Pods
      pods:
        metric:
          name: active_sessions
        target:
          type: AverageValue
          averageValue: {{ .Values.orchestrator.hpa.customMetrics.activeSessions.averageValue | quote }}
    {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
{{- end }}


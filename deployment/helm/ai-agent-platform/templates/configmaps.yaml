---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: {{ .Values.namespaces.gateway.name }}
  labels:
    {{- include "ai-agent-platform.serviceLabels" (dict "name" "api-gateway" "context" $) | nindent 4 }}
data:
  application.yaml: |
    server:
      port: {{ .Values.gateway.port }}
      shutdown: graceful

    spring:
      application:
        name: api-gateway
      lifecycle:
        timeout-per-shutdown-phase: 30s
      cloud:
        gateway:
          routes:
            - id: vault-identity
              uri: http://vault-identity.{{ .Values.namespaces.vault.name }}.svc.cluster.local:{{ .Values.vaultIdentity.port }}
              predicates:
                - Path=/api/v1/auth/**
            - id: vault-policy
              uri: http://vault-policy.{{ .Values.namespaces.vault.name }}.svc.cluster.local:{{ .Values.vaultPolicy.port }}
              predicates:
                - Path=/api/v1/policies/**
            - id: vault-audit
              uri: http://vault-audit.{{ .Values.namespaces.vault.name }}.svc.cluster.local:{{ .Values.vaultAudit.port }}
              predicates:
                - Path=/api/v1/audit/**
            - id: orchestrator
              uri: http://orchestrator.{{ .Values.namespaces.agents.name }}.svc.cluster.local:{{ .Values.orchestrator.port }}
              predicates:
                - Path=/api/v1/agents/**
            - id: account-agent
              uri: http://account-agent.{{ .Values.namespaces.agents.name }}.svc.cluster.local:{{ .Values.accountAgent.port }}
              predicates:
                - Path=/api/v1/accounts/**
            - id: core-banking-mcp
              uri: http://core-banking-mcp.{{ .Values.namespaces.mcpServers.name }}.svc.cluster.local:{{ .Values.coreBankingMcp.port }}
              predicates:
                - Path=/api/v1/banking/**

    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus,metrics
      endpoint:
        health:
          show-details: always
          probes:
            enabled: true

    logging:
      level:
        root: INFO
        com.bank.gateway: DEBUG
---
{{- if .Values.configServer.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-server-config
  namespace: {{ .Values.namespaces.admin.name }}
  labels:
    {{- include "ai-agent-platform.serviceLabels" (dict "name" "config-server" "context" $) | nindent 4 }}
data:
  application.yaml: |
    server:
      port: {{ .Values.configServer.port }}
      shutdown: graceful

    spring:
      application:
        name: config-server
      lifecycle:
        timeout-per-shutdown-phase: 30s
      cloud:
        config:
          server:
            git:
              uri: {{ .Values.configServer.configRepoUri }}
              default-label: main
              clone-on-start: true
              timeout: 10
            native:
              search-locations:
                - classpath:/config
                - file:/config

    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus,metrics,env,refresh
      endpoint:
        health:
          show-details: always
          probes:
            enabled: true

    logging:
      level:
        root: INFO
        org.springframework.cloud.config: DEBUG

    encrypt:
      enabled: true
{{- end }}
---
# OPA Policy ConfigMap for vault-policy service
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policies
  namespace: {{ .Values.namespaces.vault.name }}
  labels:
    {{- include "ai-agent-platform.serviceLabels" (dict "name" "vault-policy" "context" $) | nindent 4 }}
data:
  banking_policy.rego: |
    package banking.authorization

    default allow = false

    # Allow authenticated users to access their own accounts
    allow {
      input.method == "GET"
      input.path = ["api", "v1", "accounts", account_id]
      input.user.account_ids[_] == account_id
    }

    # Allow transfers below daily limit
    allow {
      input.method == "POST"
      input.path = ["api", "v1", "transfers"]
      input.body.amount <= input.user.daily_transfer_limit
    }

    # Allow admins full access
    allow {
      input.user.roles[_] == "ADMIN"
    }

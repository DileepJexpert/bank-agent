{{- $svc := .Values.gateway -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: {{ .Values.namespaces.gateway.name }}
  labels:
    {{- include "ai-agent-platform.serviceLabels" (dict "name" "api-gateway" "context" $) | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Values.namespaces.gateway.name }}
  labels:
    {{- include "ai-agent-platform.serviceLabels" (dict "name" "api-gateway" "context" $) | nindent 4 }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-agent-platform.selectorLabels" (dict "name" "api-gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-agent-platform.selectorLabels" (dict "name" "api-gateway") | nindent 8 }}
        app.kubernetes.io/part-of: ai-agent-platform
      annotations:
        {{- include "ai-agent-platform.prometheusAnnotations" (dict "port" (toString $svc.port)) | nindent 8 }}
    spec:
      serviceAccountName: {{ $svc.serviceAccount.name }}
      securityContext:
        {{- include "ai-agent-platform.podSecurityContext" $ | nindent 8 }}
      terminationGracePeriodSeconds: 45
      containers:
        - name: api-gateway
          image: {{ include "ai-agent-platform.image" (dict "repository" $svc.image.repository "tag" $svc.image.tag "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: JAVA_OPTS
              value: {{ $svc.javaOpts | quote }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          {{- include "ai-agent-platform.livenessProbe" $ | nindent 10 }}
          {{- include "ai-agent-platform.readinessProbe" $ | nindent 10 }}
          {{- include "ai-agent-platform.startupProbe" $ | nindent 10 }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          securityContext:
            {{- include "ai-agent-platform.containerSecurityContext" $ | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: api-gateway-config
      {{- include "ai-agent-platform.podAntiAffinity" (dict "name" "api-gateway") | nindent 6 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "ai-agent-platform.selectorLabels" (dict "name" "api-gateway") | nindent 14 }}

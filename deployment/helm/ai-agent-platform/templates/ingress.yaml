{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-agent-platform-ingress
  namespace: {{ .Values.namespaces.gateway.name }}
  labels:
    {{- include "ai-agent-platform.serviceLabels" (dict "name" "api-gateway" "context" $) | nindent 4 }}
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn | quote }}
    {{- if .Values.ingress.wafAclArn }}
    alb.ingress.kubernetes.io/wafv2-acl-arn: {{ .Values.ingress.wafAclArn | quote }}
    {{- end }}
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/load-balancer-attributes: >-
      access_logs.s3.enabled=true,
      access_logs.s3.bucket=ai-agent-platform-alb-logs,
      access_logs.s3.prefix=gateway,
      idle_timeout.timeout_seconds=60,
      routing.http.drop_invalid_header_fields.enabled=true
    alb.ingress.kubernetes.io/target-group-attributes: >-
      deregistration_delay.timeout_seconds=30,
      stickiness.enabled=false
    alb.ingress.kubernetes.io/tags: >-
      Environment={{ .Values.global.environment }},
      Application=ai-agent-platform
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        {{- range .Values.ingress.hosts }}
        - {{ .host }}
        {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ $.Values.gateway.port }}
          {{- end }}
    {{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: {{ .Values.namespaces.gateway.name }}
  labels:
    {{- include "ai-agent-platform.serviceLabels" (dict "name" "api-gateway" "context" $) | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "ai-agent-platform.selectorLabels" (dict "name" "api-gateway") | nindent 6 }}
{{- end }}

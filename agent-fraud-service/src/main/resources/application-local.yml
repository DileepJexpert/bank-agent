# Local debug profile - points to Docker Desktop services
# Usage: mvn spring-boot:run -pl agent-fraud-service -Dspring-boot.run.profiles=local
server:
  port: 8096

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fraud_service
    username: platform
    password: platform_dev_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: fraud-service-local
      auto-offset-reset: earliest

agent:
  vault:
    base-url: http://localhost:8082
  mcp:
    notification-url: http://localhost:8090
    payment-gateway-url: http://localhost:8091
    core-banking-url: http://localhost:8086

logging:
  level:
    com.idfcfirstbank.agent.fraud: DEBUG

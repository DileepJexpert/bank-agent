# Local debug profile - points to Docker Desktop services + Ollama
# Usage: mvn spring-boot:run -pl agent-card-service -Dspring-boot.run.profiles=local
server:
  port: 8088

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.anthropic.AnthropicAutoConfiguration
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:29092
  ai:
    openai:
      api-key: ollama
      base-url: http://localhost:11434/v1
      chat:
        options:
          model: llama3.1
          temperature: 0.1

agent:
  llm:
    provider: ollama
    model-name: llama3.1
  vault:
    base-url: http://localhost:8082
  mcp:
    card-management-url: http://localhost:8089
    notification-url: http://localhost:8090

logging:
  level:
    com.idfcfirstbank.agent.card: DEBUG
    org.springframework.ai: DEBUG

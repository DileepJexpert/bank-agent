server:
  port: 8094

spring:
  application:
    name: agent-wealth-service

  # --- Spring AI LLM Configuration ---
  ai:
    anthropic:
      api-key: ${LLM_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4096
          temperature: 0.7

    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o
          max-tokens: 4096
          temperature: 0.7

  # --- Redis ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  # --- Kafka ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: wealth-agent-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.idfcfirstbank.agent.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# --- Agent Platform Configuration ---
agent:
  llm:
    provider: ${LLM_PROVIDER:anthropic}
    model-name: ${LLM_MODEL:claude-sonnet-4-20250514}
    api-key: ${LLM_API_KEY:}
    temperature: 0.7
    max-tokens: 4096
    timeout: 30s

  instance-id: ${HOSTNAME:wealth-agent-0}

  vault:
    base-url: ${VAULT_POLICY_URL:http://vault-policy-service:8082}

  mcp:
    investment-url: ${MCP_INVESTMENT_URL:http://mcp-investment-server:8090}
    insurance-url: ${MCP_INSURANCE_URL:http://mcp-insurance-server:8091}
    customer-profile-url: ${MCP_CUSTOMER_PROFILE_URL:http://mcp-customer-profile-server:8092}

# --- Actuator & Observability ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# --- API Docs ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# --- Logging ---
logging:
  level:
    com.idfcfirstbank.agent.wealth: DEBUG
    org.springframework.ai: INFO

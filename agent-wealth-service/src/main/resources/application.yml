server:
  port: 8094

spring:
  application:
    name: agent-wealth-service

  # --- Redis ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  # --- Kafka ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: wealth-agent-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.idfcfirstbank.agent.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# --- LLM Provider Configuration ---
# Enable one or more providers via llm.<provider>.enabled=true
# Multiple providers can be enabled simultaneously for LlmRouter failover.
llm:
  timeout: ${LLM_TIMEOUT:30s}
  ollama:
    enabled: ${LLM_OLLAMA_ENABLED:true}
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.1}
  anthropic:
    enabled: ${LLM_ANTHROPIC_ENABLED:false}
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
  openai:
    enabled: ${LLM_OPENAI_ENABLED:false}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
  azure:
    enabled: ${LLM_AZURE_ENABLED:false}
    endpoint: ${AZURE_OPENAI_ENDPOINT:}
    api-key: ${AZURE_OPENAI_KEY:}
    deployment: ${AZURE_OPENAI_DEPLOYMENT:gpt-4o}
    api-version: ${AZURE_OPENAI_API_VERSION:2024-02-15-preview}

# --- Agent Platform Configuration ---
agent:
  instance-id: ${HOSTNAME:wealth-agent-0}

  vault:
    base-url: ${VAULT_POLICY_URL:http://vault-policy-service:8082}

  mcp:
    investment-url: ${MCP_INVESTMENT_URL:http://mcp-investment-server:8090}
    insurance-url: ${MCP_INSURANCE_URL:http://mcp-insurance-server:8091}
    customer-profile-url: ${MCP_CUSTOMER_PROFILE_URL:http://mcp-customer-profile-server:8092}

# --- Actuator & Observability ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# --- API Docs ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# --- Logging ---
logging:
  level:
    com.idfcfirstbank.agent.wealth: DEBUG
